<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracling Modal</title>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-3">
  <button type="button" class="confirm-btn" data-bs-toggle="modal" data-bs-target="#myModal">
    Open modal
  </button>
</div>
<div class="modal" id="myModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <!-- Modal body -->
      <div class="modal-body">
        <div class="d-flex justify-content-center"><img src="assets/images/fulllogo.svg"></div>
            <p class="calendar-heading mt-4">Select a date & Time</p>
            <p class="text-center fw-bold calendar-month"><img src="assets/images/Vector.svg" class="me-4">March 2026</p>
            <div class="row header fw-bold text-center">
                <div class="col calendar-day">SUN</div>
                <div class="col calendar-day">MON</div>
                <div class="col calendar-day">TUE</div>
                <div class="col calendar-day">WED</div>
                <div class="col calendar-day">THU</div>
                <div class="col calendar-day">FRI</div>
                <div class="col calendar-day">SAT</div>
            </div>
            <div class="row text-center mt-3">
                <div class="col text-muted calendar-date">28</div>
                <div class="col text-muted calendar-date">29</div>
                <div class="col text-muted calendar-date">30</div>
                <div class="col text-muted calendar-date">1</div>
                <div class="col calendar-date">2</div>
                <div class="col calendar-date">3</div>
                <div class="col calendar-date">4</div>
            </div>
            <div class="row text-center mt-3">
                <div class="col calendar-date">5</div>
                <div class="col calendar-date">6</div>
                <div class="col calendar-date">7</div>
                <div class="col calendar-date">8</div>
                <div class="col calendar-date">9</div>
                <div class="col calendar-date">10</div>
                <div class="col calendar-date">11</div>
            </div>
            <div class="row text-center mt-3">
                <div class="col calendar-date">12</div>
                <div class="col calendar-date">13</div>
                <div class="col calendar-date">14</div>
                <div class="col calendar-date">15</div>
                <div class="col calendar-date">16</div>
                <div class="col calendar-date">17</div>
                <div class="col calendar-date">18</div>
            </div>
            <div class="row text-center mt-3">
                <div class="col calendar-date">19</div>
                <div class="col calendar-date">20</div>
                <div class="col calendar-date">21</div>
                <div class="col calendar-date">22</div>
                <div class="col calendar-date">23</div>
                <div class="col calendar-date">24</div>
                <div class="col calendar-date">25</div>
            </div>
            <div class="row text-center mt-3">
                <div class="col calendar-date">26</div>
                <div class="col calendar-date">27</div>
                <div class="col calendar-date">28</div>
                <div class="col calendar-date">29</div>
                <div class="col calendar-date">30</div>
                <div class="col calendar-date">31</div>
                <div class="col text-muted calendar-date">1</div>
            </div>
            <div class="row mb-3 mt-4">
                <div class="col-lg-8 col-md-12 col-sm-12">
                    <p class="date_time"><img src="assets/images/Group.svg" class="me-2">Asia/Dhaka (10:30am)<image src="assets/images/arrow-down.svg"></p>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-9 col-md-12 col-sm-12">
                    <select class="form-select">
                        <option>10:30</option>
                    </select>
                </div>
                <div class="col-lg-3 col-md-12 col-sm-12 mt-3 mt-lg-0">
                    <select class="form-select">
                        <option>AM</option>
                    </select>
                </div>
            </div>
           <div class="row mt-5">
                <div class="col-6 col-sm-6 col-md-6 col-lg-4">
                    <button class="confirm-btn" type="button">Confirm</button>
                </div>
                <div class="col-6 col-sm-6 col-md-6 col-lg-4">
                    <button class="confirm-btn" type="button">Back</button>
                </div>
            </div>
      </div>
    </div>
  </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

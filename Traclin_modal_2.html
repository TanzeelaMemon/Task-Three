<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracling Modal</title>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-3">
        <button type="button" class="confirm-btn" data-bs-toggle="modal" data-bs-target="#myModal">
    Open modal
  </button>
</div>

<div class="modal" id="myModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <!-- Modal body -->
      <div class="modal-body">
        <div class="d-flex justify-content-center"><img src="assets/images/fulllogo.svg"></div>
        <form method="post" action="#">
            <p class="fw-bold mt-3">Enter Details</p>
            <div class="row mb-3">
                <div class="col-lg-12 col-md-12 col-sm-12">
                    <input type="text" name="Name" placeholder="Name" class="form-control">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-lg-12 col-md-12 col-sm-12">
                    <input type="email" name="Email" placeholder="Email" class="form-control">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-lg-12 col-md-12 col-sm-12">
                    <input type="text" name="hourlyrate" placeholder="Hourly Rate $50" class="form-control">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-lg-12 col-md-12 col-sm-12">
                    <select name="paymentoption" class="form-select">
                        <option value="" disabled selected>Payment Option</option>
                        <option value="Credit Card">Credit Card</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-12 col-md-12 col-sm-12">
                    <textarea placeholder="Insert the details about your subject and expected lenght" class="form-control"></textarea>
                </div>
            </div>
            <div class="row mt-5">
                <div class="col-6 col-sm-6 col-md-6 col-lg-5">
                    <button class="confirm-btn">Pre-booking</button>
                </div>
                <div class="col-6 col-sm-6 col-md-6 col-lg-4">
                    <button class="confirm-btn">Back</button>
                </div>
            </div>
        </form>
      </div>
    </div>
  </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracling Modal</title>


  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="container mt-3">
  <button type="button" class="confirm-btn" data-bs-toggle="modal" data-bs-target="#myModal">
    Open modal
  </button>
</div>

<!-- The Modal -->
<div class="modal" id="myModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <!-- Modal Header -->
      <div class="modal-header flex-column text-center">
        <img src="assets/images/fulllogo.svg" class="mb-5">
        <h4 class="confirmed_modal_heading">Confirmed</h4>
        <p class="confirmed_modal_para1">You are scheduled with rober</p>
      </div>

      <!-- Modal body -->
      <div class="modal-body">
        <!-- <div class="text-center"> -->
            <p class="fw-bold confirmed_modal_heading text-center">Traclin Introduction call</p>
            <p class="text-center confirmed_modal_para1"><img src="assets/images/calendar.svg" class="me-2"><span>9.30am - 9.45am, Tuesday, August 30,2022</span></p>
            <p class="text-center confirmed_modal_para1"><img src="assets/images/world 1.svg" class="me-2">Asia/Dhaka</p>
            <p class="text-center confirmed_modal_para1"><img src="assets/images/video.svg" class="me-2">Web conferencing details to follow.</p>
            <p class="text-center confirmed_modal_para2 pb-5">A calendar invitation has been sent to your email address.</p>
        <!-- </div> -->
      </div>
    </div>
  </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
